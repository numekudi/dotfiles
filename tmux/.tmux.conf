# Prefix
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix
bind C-b send-prefix

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -s escape-time 10
set -g focus-events on

# Behavior
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g display-time 2000

# Clipboard integration
set -s set-clipboard on
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-copy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$HOME/.local/bin/tmux-copy"

# Copy mode
setw -g mode-keys vi
set -g status-keys vi
bind [ copy-mode

# Windows and panes
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind X kill-window

# Pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 5

# Session navigation
bind w choose-tree -Zw
bind s choose-session
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Status line
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour250"
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=colour81,bold]#S #[fg=colour245]#I:#P "
set -g status-right "#[fg=colour245]%Y-%m-%d #[fg=colour81]%H:%M"
setw -g window-status-current-style "fg=colour235,bg=colour81,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-style "fg=colour250,bg=colour235"
setw -g window-status-format " #I:#W "
setw -g pane-border-style "fg=colour238"
setw -g pane-active-border-style "fg=colour81"
set -g message-style "bg=colour81,fg=colour235"
